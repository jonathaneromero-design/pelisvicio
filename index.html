<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PELISVICIO LIVE - Modo Cine Puro</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Permanent+Marker&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --azul-neon: #00f2fe;
            --verde-neon: #4facfe;
            --negro-fondo: #050505;
        }

        body {
            background-color: var(--negro-fondo);
            background-image: linear-gradient(to bottom, rgba(5, 5, 5, 0.8), rgba(5, 5, 5, 0.9)),
                url('https://wallpapers.com/images/hd/hd-anime-galaxy-xxotwlnlan1322q0.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #e0e0e0;
            font-family: 'Roboto', sans-serif;
            text-align: center;
            margin: 0;
            overflow: hidden;
        }

        .header {
            background: rgba(10, 10, 10, 0.95);
            padding: 15px;
            border-bottom: 2px solid var(--azul-neon);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }

        h1 {
            font-family: 'Permanent Marker', cursive;
            color: white;
            font-size: 2.5em;
            margin: 0;
            letter-spacing: 4px;
            text-shadow: 0 0 10px var(--azul-neon);
        }

        .container { max-width: 950px; margin: 15px auto; padding: 10px; }

        .operator-panel {
            background: rgba(0, 51, 42, 0.7);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 15px;
            border: 1px solid var(--azul-neon);
            backdrop-filter: blur(10px);
        }

        #copy-box {
            background: rgba(0,0,0,0.6);
            padding: 12px;
            border: 1px dashed var(--verde-neon);
            margin: 15px 0;
            cursor: pointer;
            font-family: monospace;
            font-size: 0.9em;
            color: var(--verde-neon);
            word-break: break-all;
        }

        /* CONTENEDOR DE VIDEO */
        #video-container {
            position: relative;
            background: #000;
            border-radius: 15px;
            border: 4px solid var(--verde-neon);
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0,0,0,0.9);
            cursor: none; /* Oculta el puntero por defecto */
        }

        /* Si el mouse se mueve, mostramos el puntero */
        #video-container.show-cursor { cursor: default; }

        video { width: 100%; display: block; pointer-events: none; }

        /* CONTROLES AUTO-OCULTABLES */
        .custom-controls {
            position: absolute;
            bottom: 25px;
            right: 25px;
            display: flex;
            gap: 12px;
            opacity: 0; /* Ocultos */
            visibility: hidden;
            transition: opacity 0.5s ease, visibility 0.5s;
            z-index: 100;
        }

        /* Clase que activa la visibilidad */
        .ui-visible {
            opacity: 1;
            visibility: visible;
        }

        .btn-control {
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid var(--azul-neon);
            color: var(--azul-neon);
            padding: 10px 20px;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75em;
            border-radius: 5px;
            text-transform: uppercase;
        }

        .btn-control:hover { background: var(--azul-neon); color: black; }

        button#startBtn {
            background: linear-gradient(180deg, var(--azul-neon), #0077be);
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>PELISVICIO</h1>
    </div>

    <div class="container">
        <div class="operator-panel" id="op-ui">
            <p style="margin:0; font-family: 'Orbitron'; color: var(--azul-neon);">MODO OPERADOR</p>
            <div id="copy-box" onclick="copyLink()">Generando link...</div>
            <button id="startBtn" onclick="startBroadcasting()">INICIAR TRANSMISIÓN</button>
        </div>

        <div id="video-container">
            <video id="remoteVideo" autoplay playsinline></video>
            
            <div id="controls-ui" class="custom-controls">
                <button class="btn-control" onclick="toggleMute()" id="muteBtn">AUDIO: ON</button>
                <button class="btn-control" onclick="goFullScreen()">PANTALLA COMPLETA</button>
            </div>
        </div>
    </div>

    <script>
        let hashId = window.location.hash.substring(1);
        const isOperator = !hashId;
        const myId = isOperator ? Math.random().toString(36).substr(2, 5).toUpperCase() : "REC-" + hashId;
        const targetId = isOperator ? "REC-" + myId : myId;

        const peer = new Peer(myId);
        const video = document.getElementById('remoteVideo');
        const container = document.getElementById('video-container');
        const controls = document.getElementById('controls-ui');
        let hideTimeout;

        if (!isOperator) {
            document.getElementById('op-ui').style.display = 'none';
        } else {
            const fullLink = window.location.href.split('#')[0] + "#" + myId;
            document.getElementById('copy-box').innerText = fullLink;
        }

        // LÓGICA PARA OCULTAR CONTROLES Y CURSOR
        container.addEventListener('mousemove', () => {
            controls.classList.add('ui-visible');
            container.classList.add('show-cursor');
            clearTimeout(hideTimeout);
            hideTimeout = setTimeout(() => {
                controls.classList.remove('ui-visible');
                container.classList.remove('show-cursor');
            }, 3000); // 3 segundos de inactividad
        });

        peer.on('call', call => {
            call.answer();
            call.on('stream', stream => {
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    video.play();
                    if (video.buffered.length > 0) video.currentTime = video.buffered.end(0) - 0.1;
                };
            });
        });

        async function startBroadcasting() {
            try {
                const stream = await navigator.mediaDevices.getDisplayMedia({
                    video: { frameRate: 60 },
                    audio: true
                });

                const audioCtx = new AudioContext();
                const source = audioCtx.createMediaStreamSource(stream);
                const gainNode = audioCtx.createGain();
                gainNode.gain.value = 1.8; 
                const dest = audioCtx.createMediaStreamDestination();
                source.connect(gainNode);
                gainNode.connect(dest);

                const finalStream = new MediaStream([
                    stream.getVideoTracks()[0],
                    dest.stream.getAudioTracks()[0]
                ]);

                video.srcObject = finalStream;
                peer.call(targetId, finalStream);
                alert("Transmitiendo. Comparte el link.");
            } catch (e) { alert("Error al capturar pantalla."); }
        }

        function copyLink() {
            navigator.clipboard.writeText(document.getElementById('copy-box').innerText);
            alert("Link copiado.");
        }

        function toggleMute() {
            video.muted = !video.muted;
            document.getElementById('muteBtn').innerText = video.muted ? 'AUDIO: OFF' : 'AUDIO: ON';
        }

        function goFullScreen() {
            if (container.requestFullscreen) container.requestFullscreen();
            else if (container.webkitRequestFullscreen) container.webkitRequestFullscreen();
        }
    </script>
</body>
</html>
