 <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PELISVICIO LIVE - Ultra Low Latency</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Permanent+Marker&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --azul-neon: #00f2fe;
            --verde-neon: #4facfe;
            --negro-fondo: #050505;
        }

        body {
            background-color: var(--negro-fondo);
            background-image: linear-gradient(to bottom, rgba(5, 5, 5, 0.8), rgba(5, 5, 5, 0.9)),
                url('https://images.alphacoders.com/131/1317666.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #e0e0e0;
            font-family: 'Roboto', sans-serif;
            text-align: center;
            margin: 0;
            overflow: hidden;
        }

        .header {
            background: rgba(10, 10, 10, 0.95);
            padding: 15px;
            border-bottom: 2px solid var(--azul-neon);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }

        h1 {
            font-family: 'Permanent Marker', cursive;
            color: white;
            font-size: 2.5em;
            margin: 0;
            letter-spacing: 4px;
            text-shadow: 0 0 10px var(--azul-neon);
        }

        .live-indicator {
            width: 15px; height: 15px;
            background-color: rgba(229, 9, 20, 0.5);
            border: 2px solid #e50914;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 0.7; }
            50% { transform: scale(1.1); opacity: 0.3; }
            100% { transform: scale(0.9); opacity: 0.7; }
        }

        .container { max-width: 950px; margin: 15px auto; padding: 10px; }

        .operator-panel {
            background: rgba(0, 51, 42, 0.7);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 15px;
            border: 1px solid var(--azul-neon);
            backdrop-filter: blur(10px);
        }

        #copy-box {
            background: rgba(0,0,0,0.6);
            padding: 12px;
            border: 1px dashed var(--verde-neon);
            margin: 15px 0;
            cursor: pointer;
            font-family: monospace;
            font-size: 0.9em;
            color: var(--verde-neon);
            word-break: break-all;
        }

        #video-container {
            position: relative;
            background: #000;
            border-radius: 15px;
            border: 4px solid var(--verde-neon);
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0,0,0,0.9);
        }

        video { width: 100%; display: block; pointer-events: none; }

        .custom-controls {
            position: absolute;
            bottom: 25px;
            right: 25px;
            display: flex;
            gap: 12px;
            opacity: 0;
            transition: opacity 0.4s ease;
            z-index: 100;
        }

        #video-container:hover .custom-controls { opacity: 1; }

        .btn-control {
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid var(--azul-neon);
            color: var(--azul-neon);
            padding: 10px 20px;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75em;
            border-radius: 5px;
            text-transform: uppercase;
        }

        .btn-control:hover { background: var(--azul-neon); color: black; }

        button#startBtn {
            background: linear-gradient(180deg, var(--azul-neon), #0077be);
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 1px;
        }

        button#startBtn:hover { box-shadow: 0 0 20px var(--azul-neon); transform: scale(1.02); }
    </style>
</head>
<body>

    <div class="header">
        <div class="live-indicator"></div>
        <h1>PELISVICIO</h1>
    </div>

    <div class="container">
        <div class="operator-panel" id="op-ui">
            <p style="margin:0; font-family: 'Orbitron'; color: var(--azul-neon);">CONFIGURACIÓN DE TRANSMISIÓN</p>
            <div id="copy-box" onclick="copyLink()">Generando link de sala...</div>
            <button id="startBtn" onclick="startBroadcasting()">INICIAR LIVE (SIN LAG)</button>
        </div>

        <div id="video-container">
            <video id="remoteVideo" autoplay playsinline></video>
            
            <div class="custom-controls">
                <button class="btn-control" onclick="toggleMute()" id="muteBtn">SONIDO: ON</button>
                <button class="btn-control" onclick="goFullScreen()">PANTALLA COMPLETA</button>
            </div>
        </div>
    </div>

    <script>
        // Lógica de URL Dinámica para GitHub Pages
        let hashId = window.location.hash.substring(1);
        const isOperator = !hashId;
        
        // El operador genera un ID, el receptor usa el que viene en el link
        const myId = isOperator ? Math.random().toString(36).substr(2, 5).toUpperCase() : "REC-" + hashId;
        const targetId = isOperator ? "REC-" + myId : myId;

        const peer = new Peer(myId, { debug: 1 });
        const video = document.getElementById('remoteVideo');

        // Configuración de interfaz inicial
        if (!isOperator) {
            document.getElementById('op-ui').style.display = 'none';
        } else {
            // Actualizar el link para compartir
            const fullLink = window.location.href.split('#')[0] + "#" + myId;
            document.getElementById('copy-box').innerText = fullLink;
        }

        peer.on('open', id => console.log('Tu ID de red es:', id));

        // El Receptor recibe la señal automáticamente
        peer.on('call', call => {
            call.answer();
            call.on('stream', stream => {
                video.srcObject = stream;
                // Ajuste de latencia al recibir
                video.onloadedmetadata = () => {
                    video.play();
                    if (video.buffered.length > 0) {
                        video.currentTime = video.buffered.end(0) - 0.1;
                    }
                };
            });
        });

        // Función del Operador para transmitir
        async function startBroadcasting() {
            try {
                const stream = await navigator.mediaDevices.getDisplayMedia({
                    video: { 
                        frameRate: { ideal: 60, max: 60 },
                        width: { ideal: 1920 },
                        height: { ideal: 1080 }
                    },
                    audio: {
                        echoCancellation: false,
                        noiseSuppression: false,
                        autoGainControl: false
                    }
                });

                // Boost de Audio (1.8x)
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const source = audioCtx.createMediaStreamSource(stream);
                const gainNode = audioCtx.createGain();
                gainNode.gain.value = 1.8; 
                const dest = audioCtx.createMediaStreamDestination();
                source.connect(gainNode);
                gainNode.connect(dest);

                const finalStream = new MediaStream([
                    stream.getVideoTracks()[0],
                    dest.stream.getAudioTracks()[0]
                ]);

                video.srcObject = finalStream;
                
                // Llamar al ID del receptor (que es el ID de la sala con prefijo REC-)
                peer.call(targetId, finalStream);
                
                alert("¡Transmitiendo! Asegúrate de que tus amigos abrieron el link DESPUÉS de que tú iniciaste.");
            } catch (e) {
                alert("Error: Debes permitir captura de pantalla y audio.");
            }
        }

        function copyLink() {
            const link = document.getElementById('copy-box').innerText;
            navigator.clipboard.writeText(link);
            alert("Link de sala copiado. Pásalo a tus invitados.");
        }

        function toggleMute() {
            video.muted = !video.muted;
            document.getElementById('muteBtn').innerText = video.muted ? 'SONIDO: OFF' : 'SONIDO: ON';
        }

        function goFullScreen() {
            const v = document.getElementById('video-container');
            if (v.requestFullscreen) v.requestFullscreen();
            else if (v.webkitRequestFullscreen) v.webkitRequestFullscreen();
        }
    </script>
</body>
</html>
