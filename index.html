<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PELISVICIO LIVE - P2P</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Permanent+Marker&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --azul-neon: #00f2fe;
            --verde-neon: #4facfe;
            --rojo-transparente: rgba(229, 9, 20, 0.5);
            --negro-fondo: #050505;
        }

        body {
            background-color: var(--negro-fondo);
            background-image: 
                linear-gradient(to bottom, rgba(5, 5, 5, 0.7), rgba(5, 5, 5, 0.9)),
                url('https://wallpapers.com/images/hd/hd-anime-galaxy-xxotwlnlan1322q0.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #e0e0e0;
            font-family: 'Roboto', sans-serif;
            text-align: center;
            margin: 0;
        }

        /* ENCABEZADO CON PELISVICIO Y CÍRCULO ROJO */
        .header {
            background: rgba(10, 10, 10, 0.85);
            padding: 25px;
            border-bottom: 3px solid var(--azul-neon);
            box-shadow: 0 5px 20px rgba(0, 242, 254, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }

        h1 {
            font-family: 'Permanent Marker', cursive;
            color: white;
            font-size: 3.5em;
            margin: 0;
            letter-spacing: 5px;
            text-shadow: 0 0 15px var(--azul-neon);
        }

        /* Círculo Rojo Transparente que Parpadea */
        .live-indicator {
            width: 25px;
            height: 25px;
            background-color: var(--rojo-transparente);
            border: 2px solid #e50914;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 0.7; }
            50% { transform: scale(1.1); opacity: 0.3; }
            100% { transform: scale(0.9); opacity: 0.7; }
        }

        .container { max-width: 1100px; margin: 30px auto; padding: 20px; }

        .panel {
            background: rgba(0, 51, 42, 0.5); /* Más transparente */
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 25px;
            border: 1px solid var(--azul-neon);
            border-left: 8px solid var(--verde-neon);
            backdrop-filter: blur(8px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .id-tag {
            color: var(--azul-neon);
            font-weight: bold;
            font-size: 1.8em;
            font-family: 'Orbitron', sans-serif;
            background: rgba(0,0,0,0.4);
            padding: 5px 15px;
            border-radius: 6px;
            text-shadow: 0 0 8px var(--azul-neon);
        }

        input {
            padding: 12px;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid var(--azul-neon);
            color: white;
            border-radius: 5px;
            width: 200px;
            font-family: 'Orbitron', sans-serif;
        }

        button {
            padding: 12px 25px;
            background: linear-gradient(180deg, var(--azul-neon), #0077be);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            border-radius: 5px;
            font-family: 'Orbitron', sans-serif;
            transition: 0.3s;
        }

        button:hover { box-shadow: 0 0 20px var(--azul-neon); transform: scale(1.05); }

        #video-wrapper {
            background: #000;
            border-radius: 15px;
            border: 4px solid var(--verde-neon);
            box-shadow: 0 0 50px rgba(0,0,0,0.9);
            overflow: hidden;
        }

        video { width: 100%; display: block; }
    </style>
</head>
<body>

    <div class="header">
        <div class="live-indicator"></div>
        <h1>PELISVICIO</h1>
    </div>

    <div class="container">
        <div class="panel">
            <p>ID DE SALA: <span id="my-id" class="id-tag">...</span></p>
            <div style="margin-top:20px; display:flex; justify-content:center; gap:10px;">
                <input type="text" id="peer-id-input" placeholder="ID Amigo">
                <button onclick="startSharing()">COMPARTIR PANTALLA</button>
            </div>
        </div>

        <div id="video-wrapper">
            <video id="remoteVideo" autoplay playsinline controls></video>
        </div>
    </div>

    <script>
        // Función para generar un ID corto aleatorio de 5 caracteres
        const shortId = Math.random().toString(36).substr(2, 5).toUpperCase();
        
        // Inicializar PeerJS con el ID corto
        const peer = new Peer(shortId); 

        peer.on('open', (id) => {
            document.getElementById('my-id').innerText = id;
        });

        peer.on('call', (call) => {
            call.answer();
            call.on('stream', (remoteStream) => {
                document.getElementById('remoteVideo').srcObject = remoteStream;
            });
        });

        async function startSharing() {
            const friendId = document.getElementById('peer-id-input').value;
            if (!friendId) return alert("Ingresa el ID de tu amigo");

            try {
                const stream = await navigator.mediaDevices.getDisplayMedia({
                    video: { cursor: "always" },
                    audio: true
                });
                document.getElementById('remoteVideo').srcObject = stream;
                peer.call(friendId, stream);
            } catch (err) {
                alert("Error al compartir pantalla.");
            }
        }
    </script>
</body>
</html>
