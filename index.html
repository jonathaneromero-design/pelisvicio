<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PELISVICIO - Ultra Low Latency</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Permanent+Marker&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --azul-neon: #00f2fe;
            --verde-neon: #4facfe;
            --negro-fondo: #050505;
        }

        body {
            background-color: var(--negro-fondo);
            background-image: linear-gradient(to bottom, rgba(5, 5, 5, 0.8), rgba(5, 5, 5, 0.9)),
                url('https://wallpapers.com/images/hd/hd-anime-galaxy-xxotwlnlan1322q0.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #e0e0e0;
            font-family: 'Roboto', sans-serif;
            text-align: center;
            margin: 0;
            overflow: hidden;
        }

        .header {
            background: rgba(10, 10, 10, 0.9);
            padding: 15px;
            border-bottom: 2px solid var(--azul-neon);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }

        h1 {
            font-family: 'Permanent Marker', cursive;
            color: white;
            font-size: 2.5em;
            margin: 0;
            letter-spacing: 4px;
            text-shadow: 0 0 10px var(--azul-neon);
        }

        .container { max-width: 950px; margin: 15px auto; padding: 10px; }

        .panel {
            background: rgba(0, 51, 42, 0.6);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            border: 1px solid var(--azul-neon);
            backdrop-filter: blur(10px);
        }

        .id-tag { color: var(--azul-neon); font-weight: bold; font-family: 'Orbitron', sans-serif; }

        /* CONTENEDOR DE VIDEO */
        #video-container {
            position: relative;
            background: #000;
            border-radius: 12px;
            border: 3px solid var(--verde-neon);
            overflow: hidden;
            cursor: none; /* Oculta el puntero sobre el video */
        }

        #video-container:hover { cursor: default; }

        video { width: 100%; display: block; pointer-events: none; }

        /* CONTROLES QUE SE OCULTAN */
        .custom-controls {
            position: absolute;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            opacity: 0; /* Ocultos por defecto */
            transition: opacity 0.5s ease;
            z-index: 100;
        }

        /* Clase para mostrar controles cuando hay movimiento */
        .show-controls { opacity: 1 !important; }

        .btn-control {
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid var(--azul-neon);
            color: var(--azul-neon);
            padding: 10px 18px;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7em;
            border-radius: 5px;
            text-transform: uppercase;
        }

        .btn-control:hover { background: var(--azul-neon); color: black; }

        input, button#startBtn {
            padding: 8px;
            font-family: 'Orbitron', sans-serif;
            border-radius: 4px;
            border: 1px solid var(--azul-neon);
        }

        button#startBtn { background: var(--azul-neon); cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <h1 id="main-title">PELISVICIO</h1>
    </div>

    <div class="container">
        <div class="panel">
            <p>ID SALA: <span id="my-id" class="id-tag">...</span></p>
            <input type="text" id="peer-id-input" placeholder="ID Amigo">
            <button id="startBtn" onclick="startSharing()">ENVIAR SEÑAL</button>
        </div>

        <div id="video-container" onmousemove="handleMouseMove()">
            <video id="remoteVideo" autoplay playsinline></video>
            
            <div id="controls-ui" class="custom-controls">
                <button class="btn-control" onclick="toggleMute()" id="muteBtn">SONIDO: ON</button>
                <button class="btn-control" onclick="goFullScreen()">PANTALLA COMPLETA</button>
            </div>
        </div>
    </div>

    <script>
        const shortId = Math.random().toString(36).substr(2, 5).toUpperCase();
        const peer = new Peer(shortId);
        const video = document.getElementById('remoteVideo');
        const ui = document.getElementById('controls-ui');
        let timer;

        peer.on('open', id => document.getElementById('my-id').innerText = id);

        peer.on('call', call => {
            call.answer();
            call.on('stream', stream => {
                video.srcObject = stream;
                // Forzar latencia baja en el receptor
                if ("VideoPlaybackQuality" in window) {
                    video.play();
                }
            });
        });

        // LÓGICA PARA OCULTAR CONTROLES
        function handleMouseMove() {
            ui.classList.add('show-controls');
            clearTimeout(timer);
            timer = setTimeout(() => {
                ui.classList.remove('show-controls');
            }, 3000); // Se oculta tras 3 segundos
        }

        function toggleMute() {
            video.muted = !video.muted;
            document.getElementById('muteBtn').innerText = video.muted ? 'SONIDO: OFF' : 'SONIDO: ON';
        }

        function goFullScreen() {
            const container = document.getElementById('video-container');
            if (container.requestFullscreen) container.requestFullscreen();
            else if (container.webkitRequestFullscreen) container.webkitRequestFullscreen();
        }

        async function startSharing() {
            const friendId = document.getElementById('peer-id-input').value;
            if (!friendId) return alert("Falta ID");

            try {
                // Configuración de stream para CERO LAG
                const stream = await navigator.mediaDevices.getDisplayMedia({
                    video: { 
                        cursor: "motion",
                        frameRate: { ideal: 30, max: 60 }, // Fluidez sobre resolución
                        width: { max: 1920 },
                        height: { max: 1080 }
                    },
                    audio: {
                        echoCancellation: false,
                        noiseSuppression: false,
                        autoGainControl: false // Evita que el navegador procese el audio y cause lag
                    }
                });

                // Boost de audio rápido
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const source = audioCtx.createMediaStreamSource(stream);
                const gainNode = audioCtx.createGain();
                gainNode.gain.value = 1.7; 
                const dest = audioCtx.createMediaStreamDestination();
                source.connect(gainNode);
                gainNode.connect(dest);

                const finalStream = new MediaStream([
                    stream.getVideoTracks()[0],
                    dest.stream.getAudioTracks()[0]
                ]);

                video.srcObject = finalStream;
                peer.call(friendId, finalStream);
            } catch (e) { alert("Error al iniciar."); }
        }
    </script>
</body>
</html>
