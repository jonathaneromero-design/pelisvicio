<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PELISVICIO LIVE - Sin Retraso</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Permanent+Marker&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --azul-neon: #00f2fe;
            --verde-neon: #4facfe;
            --negro-fondo: #050505;
        }

        body {
            background-color: var(--negro-fondo);
            background-image: linear-gradient(to bottom, rgba(5, 5, 5, 0.8), rgba(5, 5, 5, 0.9)),
                url('https://images.alphacoders.com/131/1317666.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #e0e0e0;
            font-family: 'Roboto', sans-serif;
            text-align: center;
            margin: 0;
            overflow: hidden;
        }

        .header {
            background: rgba(10, 10, 10, 0.95);
            padding: 15px;
            border-bottom: 2px solid var(--azul-neon);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }

        h1 {
            font-family: 'Permanent Marker', cursive;
            color: white;
            font-size: 2.5em;
            margin: 0;
            letter-spacing: 4px;
            text-shadow: 0 0 10px var(--azul-neon);
        }

        .container { max-width: 950px; margin: 15px auto; padding: 10px; }

        /* PANEL DE OPERADOR */
        .operator-panel {
            background: rgba(0, 51, 42, 0.7);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            border: 1px solid var(--azul-neon);
            backdrop-filter: blur(10px);
        }

        #copy-box {
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border: 1px dashed var(--verde-neon);
            margin: 10px 0;
            cursor: pointer;
            font-size: 0.8em;
            color: var(--verde-neon);
        }

        /* CONTENEDOR DE VIDEO */
        #video-container {
            position: relative;
            background: #000;
            border-radius: 12px;
            border: 3px solid var(--verde-neon);
            overflow: hidden;
        }

        video { width: 100%; display: block; pointer-events: none; }

        .custom-controls {
            position: absolute;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            opacity: 0;
            transition: opacity 0.5s;
        }

        #video-container:hover .custom-controls { opacity: 1; }

        .btn-control {
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid var(--azul-neon);
            color: var(--azul-neon);
            padding: 8px 15px;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7em;
            border-radius: 5px;
        }

        button#startBtn {
            background: var(--azul-neon);
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>PELISVICIO</h1>
    </div>

    <div class="container">
        <div class="operator-panel" id="op-ui">
            <p style="margin:0 0 10px 0; font-weight:bold;">MODO OPERADOR</p>
            <div id="copy-box" onclick="copyLink()">Haz clic para copiar el link y pásalo a tus amigos</div>
            <button id="startBtn" onclick="startBroadcasting()">INICIAR TRANSMISIÓN EN VIVO</button>
        </div>

        <div id="video-container">
            <video id="remoteVideo" autoplay playsinline></video>
            <div class="custom-controls">
                <button class="btn-control" onclick="toggleMute()" id="muteBtn">AUDIO: ON</button>
                <button class="btn-control" onclick="goFullScreen()">FULLSCREEN</button>
            </div>
        </div>
    </div>

    <script>
        // 1. Lógica de Link Automático
        let hashId = window.location.hash.substring(1);
        const isOperator = !hashId;
        const peerId = isOperator ? Math.random().toString(36).substr(2, 6).toUpperCase() : "REC-" + hashId;
        const targetId = isOperator ? "REC-" + peerId : peerId;

        const peer = new Peer(peerId, { debug: 1 });
        const video = document.getElementById('remoteVideo');

        if (!isOperator) {
            document.getElementById('op-ui').style.display = 'none';
        } else {
            document.getElementById('copy-box').innerText = window.location.href + "#" + peerId;
        }

        peer.on('open', id => console.log('Conectado con ID:', id));

        // El amigo (Receptor) recibe la llamada automáticamente
        peer.on('call', call => {
            call.answer();
            call.on('stream', stream => {
                video.srcObject = stream;
                video.play();
            });
        });

        // 2. Transmisión de Operador (Cero Retraso)
        async function startBroadcasting() {
            try {
                const stream = await navigator.mediaDevices.getDisplayMedia({
                    video: { 
                        displaySurface: "browser",
                        frameRate: { ideal: 60, max: 60 },
                        width: { ideal: 1920 },
                        height: { ideal: 1080 }
                    },
                    audio: {
                        echoCancellation: false,
                        noiseSuppression: false,
                        autoGainControl: false
                    }
                });

                // Boost Audio
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const source = audioCtx.createMediaStreamSource(stream);
                const gainNode = audioCtx.createGain();
                gainNode.gain.value = 1.8; 
                const dest = audioCtx.createMediaStreamDestination();
                source.connect(gainNode);
                gainNode.connect(dest);

                const finalStream = new MediaStream([
                    stream.getVideoTracks()[0],
                    dest.stream.getAudioTracks()[0]
                ]);

                video.srcObject = finalStream;

                // Intentar llamar al ID que está en el link (si ya hay alguien conectado)
                // O simplemente esperar a que ellos entren. PeerJS conectará al entrar.
                peer.call(targetId, finalStream);
                
                alert("Transmitiendo. Tus amigos deben abrir el link que copiaste.");
            } catch (e) { console.error(e); }
        }

        function copyLink() {
            const link = document.getElementById('copy-box').innerText;
            navigator.clipboard.writeText(link);
            alert("¡Link copiado! Pásalo a tus amigos.");
        }

        function toggleMute() {
            video.muted = !video.muted;
            document.getElementById('muteBtn').innerText = video.muted ? 'AUDIO: OFF' : 'AUDIO: ON';
        }

        function goFullScreen() {
            const v = document.getElementById('video-container');
            if (v.requestFullscreen) v.requestFullscreen();
            else if (v.webkitRequestFullscreen) v.webkitRequestFullscreen();
        }
    </script>
</body>
</html>
